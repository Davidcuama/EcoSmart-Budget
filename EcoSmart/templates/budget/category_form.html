{% extends "base.html" %}

{% block title %}{% if action == 'crear' %}Crear Categoría{% else %}Editar Categoría{% endif %}{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="mb-4">
        <h1 class="h3 fw-bold mb-1">{{ titulo }}</h1>
        <p class="text-muted small mb-0">Completa el formulario para continuar</p>
    </div>

    <div class="card p-4">
        <form action="" method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label for="nombre" class="form-label fw-semibold">
                    <i class="bi bi-tag me-1 text-muted"></i> Nombre de la Categoría
                </label>
                <input type="text" name="nombre" id="nombre"
                       class="form-control"
                       value="{% if categoria %}{{ categoria.nombre }}{% endif %}"
                       placeholder="Ej. Alimentación, Transporte…"
                       required>
            </div>

            <div class="d-grid gap-2 d-flex justify-content-center">
                <button type="submit" class="btn btn-primary px-4">
                    {% if action == 'crear' %}
                        <i class="bi bi-plus-circle me-1"></i> Crear Categoría
                    {% else %}
                        <i class="bi bi-check-circle me-1"></i> Actualizar Categoría
                    {% endif %}
                </button>
                <a href="{% url 'manage_categories' %}" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-x me-1"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
