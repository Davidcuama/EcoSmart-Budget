{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoSmart - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0c5aa0 0%, #084a7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-logo {
            max-width: 220px;
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        .form-control:focus {
            border-color: #0c5aa0;
            box-shadow: 0 0 0 0.2rem rgba(12,90,160,0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0c5aa0 0%, #084a7a 100%);
            border: none;
            padding: 0.7rem;
            font-weight: 600;
            border-radius: 10px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #084a7a 0%, #063a61 100%);
        }
        .form-label { font-weight: 600; color: #495057; }
        .divider { border-color: #dee2e6; }
        .input-group-text { background: #f8f9fa; border-right: none; }
        .input-group .form-control { border-left: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand-header">
            <img src="{% static 'img/logo.jpeg' %}" alt="EcoSmart Logo" class="brand-logo">
        </div>

        <h5 class="fw-bold text-center mb-4" style="color:#0c5aa0;">Iniciar Sesión</h5>

        {% if form.errors %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Usuario o contraseña incorrectos. Intenta de nuevo.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person me-1"></i> Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill text-muted"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label"><i class="bi bi-lock me-1"></i> Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
                </div>
            </div>
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </div>
        </form>

        <hr class="divider">
        <p class="text-center text-muted small mb-0">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color:#0c5aa0;">Regístrate aquí</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
